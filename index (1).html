<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScoutEdu</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.383.0/umd/lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #sky {
    position: fixed; inset: 0;
    background: linear-gradient(175deg, #0a1628 0%, #0d2142 40%, #112a55 70%, #0e1e3d 100%);
    z-index: 0;
  }

  .stars { position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 0.7; transform: scale(1.2); }
  }

  .cloud-wrap { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 2; }
  .cloud {
    position: absolute; border-radius: 50%; opacity: 0;
    filter: blur(40px);
    animation: driftCloud var(--cd) linear infinite;
    animation-delay: var(--delay);
  }
  @keyframes driftCloud {
    0%   { transform: translateX(-30%); opacity: 0; }
    10%  { opacity: var(--op); }
    85%  { opacity: var(--op); }
    100% { transform: translateX(130vw); opacity: 0; }
  }

  /* ── Language overlay ── */
  #langOverlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    backdrop-filter: blur(18px) brightness(0.45);
    -webkit-backdrop-filter: blur(18px) brightness(0.45);
    background: rgba(5, 12, 28, 0.6);
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #langOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .lang-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 6px; }
  .lang-sub   { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 44px; }

  .lang-btn {
    width: 230px; padding: 17px 24px; margin: 8px 0;
    border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.09);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .lang-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.18); }
  .lang-flag { font-size: 28px; }

  /* ── App shell ── */
  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding-bottom: 20px;
  }

  /* ── Top bar ── */
  #topBar {
    padding: 16px 18px 0;
    display: flex; align-items: center; justify-content: space-between;
    opacity: 0; transform: translateY(-12px);
    transition: opacity 0.5s 0.2s ease, transform 0.5s 0.2s ease;
  }
  #topBar.visible { opacity: 1; transform: translateY(0); }

  .logo-area { display: flex; align-items: center; gap: 9px; }
  .logo-dot {
    width: 34px; height: 34px; border-radius: 11px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 900; color: #fff;
  }
  .logo-text { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
  .logo-text span { color: #60a5fa; }

  .lang-toggle {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 13px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    cursor: pointer; color: #fff;
    font-size: 13px; font-weight: 800;
    transition: background 0.2s;
  }
  .lang-toggle:active { background: rgba(255,255,255,0.15); }
  .lang-toggle .flag { font-size: 18px; }

  /* ── Hero ── */
  #heroCard {
    margin: 16px 16px 0;
    padding: 22px 20px;
    border-radius: 24px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    opacity: 0; transform: translateY(18px);
    transition: opacity 0.5s 0.4s ease, transform 0.5s 0.4s ease;
  }
  #heroCard.visible { opacity: 1; transform: translateY(0); }

  .hero-label {
    font-size: 11px; font-weight: 800; color: #60a5fa;
    letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 8px;
  }
  .hero-question { font-size: 20px; font-weight: 900; color: #fff; line-height: 1.35; margin-bottom: 5px; }
  .hero-sub      { font-size: 13px; color: rgba(255,255,255,0.45); }

  /* ── Grid ── */
  #sectionGrid {
    margin: 14px 16px 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    opacity: 0; transform: translateY(18px);
    transition: opacity 0.5s 0.6s ease, transform 0.5s 0.6s ease;
  }
  #sectionGrid.visible { opacity: 1; transform: translateY(0); }

  .sec-btn {
    padding: 16px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    cursor: pointer; text-align: left;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .sec-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.13); }

  .sec-icon-wrap {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }
  .sec-icon-wrap svg { width: 22px; height: 22px; stroke-width: 1.8; }

  .sec-btn.blue  .sec-icon-wrap { background: rgba(96,165,250,0.15); }
  .sec-btn.blue  .sec-icon-wrap svg { stroke: #60a5fa; }
  .sec-btn.green .sec-icon-wrap { background: rgba(74,222,128,0.15); }
  .sec-btn.green .sec-icon-wrap svg { stroke: #4ade80; }
  .sec-btn.amber .sec-icon-wrap { background: rgba(251,191,36,0.15); }
  .sec-btn.amber .sec-icon-wrap svg { stroke: #fbbf24; }
  .sec-btn.coral .sec-icon-wrap { background: rgba(251,113,133,0.15); }
  .sec-btn.coral .sec-icon-wrap svg { stroke: #fb7185; }
  .sec-btn.purple .sec-icon-wrap { background: rgba(167,139,250,0.15); }
  .sec-btn.purple .sec-icon-wrap svg { stroke: #a78bfa; }

  .sec-btn.blue   { border-color: rgba(96,165,250,0.22); }
  .sec-btn.green  { border-color: rgba(74,222,128,0.22); }
  .sec-btn.amber  { border-color: rgba(251,191,36,0.22); }
  .sec-btn.coral  { border-color: rgba(251,113,133,0.22); }
  .sec-btn.purple { border-color: rgba(167,139,250,0.22); }
  .sec-btn.full   { grid-column: span 2; }

  .sec-title { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.3; }
  .sec-count { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 4px; }

  /* ── Ticker ── */
  #tickerWrap {
    margin-top: 18px; overflow: hidden;
    opacity: 0; transition: opacity 0.5s 0.9s ease;
  }
  #tickerWrap.visible { opacity: 1; }
  .ticker-label {
    font-size: 11px; font-weight: 800;
    color: rgba(255,255,255,0.3); letter-spacing: 1.4px;
    text-transform: uppercase; margin-left: 16px; margin-bottom: 9px;
  }
  .ticker-track {
    display: flex; gap: 10px;
    animation: ticker 20s linear infinite;
    width: max-content;
  }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-pill {
    padding: 9px 17px; border-radius: 30px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    white-space: nowrap; font-size: 13px; font-weight: 700; color: #fff;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .ticker-pill svg { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }
  .ticker-pill:active { background: rgba(255,255,255,0.15); }

  /* ── Detail screen ── */
  #detailScreen {
    position: fixed; inset: 0; z-index: 150;
    background: #0a1628;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  #detailScreen.open { transform: translateY(0); }

  .detail-top {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky; top: 0;
    background: #0a1628; z-index: 10;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .back-btn svg { width: 18px; height: 18px; stroke: #fff; stroke-width: 2; }
  .detail-title { font-size: 17px; font-weight: 900; color: #fff; }

  .card-list { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

  .info-card {
    padding: 16px; border-radius: 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .info-card-name { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .info-card-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(96,165,250,0.15); color: #60a5fa;
    font-size: 11px; font-weight: 700; margin-bottom: 10px;
  }
  .info-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.55);
    margin-top: 6px;
  }
  .info-row svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.4); stroke-width: 2; flex-shrink: 0; }
</style>
</head>
<body>

<div id="sky"></div>
<div class="stars" id="starsLayer"></div>
<div class="cloud-wrap" id="cloudLayer"></div>

<!-- Language Overlay -->
<div id="langOverlay">
  <div class="lang-title">Tilni tanlang</div>
  <div class="lang-sub">Выберите язык / Choose language</div>
  <button class="lang-btn" onclick="setLang('uz')">
    <span class="lang-flag">🇺🇿</span><span>O'zbekcha</span>
  </button>
  <button class="lang-btn" onclick="setLang('ru')">
    <span class="lang-flag">🇷🇺</span><span>Русский</span>
  </button>
</div>

<!-- Main App -->
<div id="app">
  <div id="topBar">
    <div class="logo-area">
      <div class="logo-dot">S</div>
      <div class="logo-text">Scout<span>Edu</span></div>
    </div>
    <div class="lang-toggle" onclick="reopenLang()">
      <span class="flag" id="currentFlag">🇺🇿</span>
      <span id="currentLangCode">UZ</span>
    </div>
  </div>

  <div id="heroCard">
    <div class="hero-label">SCOUT EDU</div>
    <div class="hero-question" id="heroQuestion"></div>
    <div class="hero-sub" id="heroSub"></div>
  </div>

  <div id="sectionGrid">
    <button class="sec-btn blue" onclick="openDetail('edu')">
      <div class="sec-icon-wrap" id="icon-edu"></div>
      <div class="sec-title" id="t-edu"></div>
      <div class="sec-count" id="s-edu"></div>
    </button>
    <button class="sec-btn green" onclick="openDetail('study')">
      <div class="sec-icon-wrap" id="icon-study"></div>
      <div class="sec-title" id="t-study"></div>
      <div class="sec-count" id="s-study"></div>
    </button>
    <button class="sec-btn amber" onclick="openDetail('vol')">
      <div class="sec-icon-wrap" id="icon-vol"></div>
      <div class="sec-title" id="t-vol"></div>
      <div class="sec-count" id="s-vol"></div>
    </button>
    <button class="sec-btn coral" onclick="openDetail('opp')">
      <div class="sec-icon-wrap" id="icon-opp"></div>
      <div class="sec-title" id="t-opp"></div>
      <div class="sec-count" id="s-opp"></div>
    </button>
    <button class="sec-btn purple full" onclick="openDetail('youth')">
      <div class="sec-icon-wrap" id="icon-youth"></div>
      <div class="sec-title" id="t-youth"></div>
      <div class="sec-count" id="s-youth"></div>
    </button>
  </div>

  <div id="tickerWrap">
    <div class="ticker-label" id="tickerLabel"></div>
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<!-- Detail Screen -->
<div id="detailScreen">
  <div class="detail-top">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="detail-title" id="detailTitle"></div>
  </div>
  <div class="card-list" id="cardList"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Section icons (lucide icon names)
const ICONS = {
  edu:   'graduation-cap',
  study: 'book-open',
  vol:   'handshake',
  opp:   'star',
  youth: 'landmark',
};

const TICKER_ICONS = {
  edu:   'graduation-cap',
  study: 'book-open',
  vol:   'handshake',
  opp:   'star',
  youth: 'landmark',
  abroad:'plane',
  startup:'lightbulb',
};

const T = {
  uz: {
    heroQuestion: "O'zingizga kerakli bo'limni tanlang",
    heroSub: "5 ta yo'nalish mavjud",
    tickerLabel: "Mashhur",
    back: "Ortga",
    langCode: "UZ", flag: "🇺🇿",
    sections: {
      edu:   { title: "Ta'lim markazlari", sub: "IELTS · SAT · Kurslar" },
      study: { title: "O'quv joylari",     sub: "Kutubxona · Coworking" },
      vol:   { title: "Volontyorlik",       sub: "Imkoniyatlar" },
      opp:   { title: "Imkoniyatlar",       sub: "Grant · Stipendiya" },
      youth: { title: "Yoshlar Agentligi",  sub: "Davlat dasturlari" },
    },
    ticker: [
      { icon: 'edu',     label: "Ta'lim markazlari" },
      { icon: 'study',   label: "Kutubxonalar" },
      { icon: 'vol',     label: "Volontyorlik" },
      { icon: 'opp',     label: "Grantlar" },
      { icon: 'youth',   label: "Yoshlar Agentligi" },
      { icon: 'abroad',  label: "Chet elda ta'lim" },
      { icon: 'startup', label: "Startap dasturlari" },
    ],
    data: {
      edu: [
        { name: "Cambridge Assessment", tag: "IELTS / SAT", location: "Yunusobod, Toshkent", phone: "+998 71 200 00 00", price: "500,000 – 1,000,000 UZS" },
        { name: "Global Education",     tag: "IELTS / TOEFL", location: "Chilonzor, Toshkent", phone: "+998 71 200 11 11", price: "400,000 – 900,000 UZS" },
        { name: "Lingua School",        tag: "Ingliz tili", location: "Mirzo Ulug'bek", phone: "+998 71 200 22 22", price: "350,000 – 700,000 UZS" },
      ],
      study: [
        { name: "Ground Zero Coworking",       tag: "Kovorking", location: "Chilonzor tumani", phone: "+998 71 200 11 11", price: "50,000 UZS / kun" },
        { name: "Alisher Navoiy Kutubxonasi",  tag: "Kutubxona", location: "Mustaqillik maydoni", phone: "+998 71 232 00 00", price: "Bepul" },
      ],
      vol: [
        { name: "Yashil Makon ko'chat ekish", tag: "Ekologiya", location: "Butun O'zbekiston", phone: "@yashil_makon_bot", price: "Doimiy" },
        { name: "Yoshlar Forum yordamchisi",  tag: "Tadbirlar",  location: "Toshkent", phone: "@yoshlar_forum", price: "Yillik" },
      ],
      opp: [
        { name: "IT Park Startup Grant", tag: "Grantlar",    location: "Toshkent IT Park", phone: "@itpark_uz",  price: "31.12.2026" },
        { name: "Umid Scholarship",      tag: "Stipendiya",  location: "O'zbekiston",       phone: "@umid_fund", price: "01.03.2026" },
      ],
      youth: [
        { name: "Yoshlar Agentligi",     tag: "Davlat", location: "Toshkent", phone: "@yoshlar_agency", price: "yoshlar.uz" },
        { name: "Prezident Maktablari",  tag: "Ta'lim", location: "Butun O'zbekiston", phone: "@prez_school", price: "president.school.uz" },
      ],
    }
  },
  ru: {
    heroQuestion: "Выберите нужный раздел",
    heroSub: "5 направлений доступно",
    tickerLabel: "Популярное",
    langCode: "RU", flag: "🇷🇺",
    sections: {
      edu:   { title: "Учебные центры",     sub: "IELTS · SAT · Курсы" },
      study: { title: "Места для учёбы",    sub: "Библиотека · Коворкинг" },
      vol:   { title: "Волонтёрство",        sub: "Возможности" },
      opp:   { title: "Возможности",         sub: "Гранты · Стипендии" },
      youth: { title: "Агентство молодёжи", sub: "Гос. программы" },
    },
    ticker: [
      { icon: 'edu',     label: "Учебные центры" },
      { icon: 'study',   label: "Библиотеки" },
      { icon: 'vol',     label: "Волонтёрство" },
      { icon: 'opp',     label: "Гранты" },
      { icon: 'youth',   label: "Агентство молодёжи" },
      { icon: 'abroad',  label: "Учёба за рубежом" },
      { icon: 'startup', label: "Стартап-программы" },
    ],
    data: {
      edu: [
        { name: "Cambridge Assessment", tag: "IELTS / SAT", location: "Юнусабад, Ташкент", phone: "+998 71 200 00 00", price: "500 000 – 1 000 000 сум" },
        { name: "Global Education",     tag: "IELTS / TOEFL", location: "Чиланзар, Ташкент", phone: "+998 71 200 11 11", price: "400 000 – 900 000 сум" },
      ],
      study: [
        { name: "Ground Zero Коворкинг",    tag: "Коворкинг",  location: "Чиланзарский район", phone: "+998 71 200 11 11", price: "50 000 сум / день" },
        { name: "Библиотека Навои",          tag: "Библиотека", location: "Пл. Независимости",  phone: "+998 71 232 00 00", price: "Бесплатно" },
      ],
      vol: [
        { name: "Посадка деревьев Yashil Makon", tag: "Экология", location: "Весь Узбекистан", phone: "@yashil_makon_bot", price: "Постоянно" },
      ],
      opp: [
        { name: "IT Park Startup Grant", tag: "Гранты",     location: "IT Park Ташкент", phone: "@itpark_uz",  price: "31.12.2026" },
        { name: "Стипендия Умид",        tag: "Стипендия",  location: "Узбекистан",       phone: "@umid_fund", price: "01.03.2026" },
      ],
      youth: [
        { name: "Агентство молодёжи",  tag: "Гос. орган", location: "Ташкент",         phone: "@yoshlar_agency", price: "yoshlar.uz" },
      ],
    }
  }
};

let lang = 'uz';

function makeLucideIcon(name) {
  const el = document.createElement('i');
  el.setAttribute('data-lucide', name);
  return el;
}

function setLang(l) {
  lang = l;
  applyLang(l);
  document.getElementById('langOverlay').classList.add('hidden');
  ['topBar','heroCard','sectionGrid','tickerWrap'].forEach(id =>
    document.getElementById(id).classList.add('visible')
  );
}

function applyLang(l) {
  const t = T[l];
  document.getElementById('heroQuestion').textContent  = t.heroQuestion;
  document.getElementById('heroSub').textContent       = t.heroSub;
  document.getElementById('tickerLabel').textContent   = t.tickerLabel;
  document.getElementById('currentFlag').textContent   = t.flag;
  document.getElementById('currentLangCode').textContent = t.langCode;

  Object.keys(t.sections).forEach(k => {
    document.getElementById('t-' + k).textContent = t.sections[k].title;
    document.getElementById('s-' + k).textContent = t.sections[k].sub;
    const wrap = document.getElementById('icon-' + k);
    wrap.innerHTML = '';
    wrap.appendChild(makeLucideIcon(ICONS[k]));
  });

  // Ticker
  const items = [...t.ticker, ...t.ticker];
  document.getElementById('tickerTrack').innerHTML = items.map(item => {
    const iconName = TICKER_ICONS[item.icon] || 'star';
    return `<div class="ticker-pill"><i data-lucide="${iconName}"></i>${item.label}</div>`;
  }).join('');

  lucide.createIcons();
}

function reopenLang() {
  document.getElementById('langOverlay').classList.remove('hidden');
}

function openDetail(key) {
  const t = T[lang];
  document.getElementById('detailTitle').textContent = t.sections[key].title;
  const items = t.data[key] || [];
  document.getElementById('cardList').innerHTML = items.map(item => `
    <div class="info-card">
      <div class="info-card-name">${item.name}</div>
      <div class="info-card-tag">${item.tag}</div>
      <div class="info-row"><i data-lucide="map-pin"></i>${item.location}</div>
      <div class="info-row"><i data-lucide="phone"></i>${item.phone}</div>
      <div class="info-row"><i data-lucide="tag"></i>${item.price}</div>
    </div>
  `).join('');
  lucide.createIcons();
  document.getElementById('detailScreen').classList.add('open');
  if (tg) tg.BackButton.show();
}

function closeDetail() {
  document.getElementById('detailScreen').classList.remove('open');
  if (tg) tg.BackButton.hide();
}

if (tg) tg.BackButton.onClick(closeDetail);

// Stars
const sl = document.getElementById('starsLayer');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 1;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
  sl.appendChild(s);
}

// Clouds
const cl = document.getElementById('cloudLayer');
for (let i = 0; i < 6; i++) {
  const c = document.createElement('div');
  c.className = 'cloud';
  const w = 180 + Math.random()*220, h = w*(0.4+Math.random()*0.3);
  const dur = 25+Math.random()*20, op = 0.5+Math.random()*0.4;
  c.style.cssText = `width:${w}px;height:${h}px;top:${Math.random()*80}%;background:rgba(200,220,255,0.05);--cd:${dur}s;--op:${op};--delay:${-Math.random()*dur}s;`;
  cl.appendChild(c);
}

applyLang('uz');
</script>
</body>
</html>
