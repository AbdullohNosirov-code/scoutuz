<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #sky {
    position: fixed; inset: 0;
    background: linear-gradient(175deg, #0a1628 0%, #0d2142 40%, #112a55 70%, #0e1e3d 100%);
    z-index: 0;
  }

  .stars { position: fixed; inset: 0; overflow: hidden; z-index: 1; }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 0.7; transform: scale(1.2); }
  }

  .cloud-wrap { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 2; }
  .cloud {
    position: absolute; border-radius: 50%; opacity: 0;
    filter: blur(40px);
    animation: driftCloud var(--cd) linear infinite;
    animation-delay: var(--delay);
  }
  @keyframes driftCloud {
    0%   { transform: translateX(-30%); opacity: 0; }
    10%  { opacity: var(--op); }
    85%  { opacity: var(--op); }
    100% { transform: translateX(130vw); opacity: 0; }
  }

  /* ── Language overlay ── */
  #langOverlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    backdrop-filter: blur(18px) brightness(0.45);
    -webkit-backdrop-filter: blur(18px) brightness(0.45);
    background: rgba(5, 12, 28, 0.6);
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #langOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .lang-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 6px; }
  .lang-sub   { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 44px; }

  .lang-btn {
    width: 230px; padding: 17px 24px; margin: 8px 0;
    border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.09);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 17px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .lang-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.18); }
  .lang-flag { font-size: 28px; }

  /* ── App shell ── */
  #app {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding-bottom: 20px;
  }

  /* ── Top bar ── */
  #topBar {
    padding: 16px 18px 0;
    display: flex; align-items: center; justify-content: space-between;
    opacity: 0; transform: translateY(-12px);
    transition: opacity 0.5s 0.2s ease, transform 0.5s 0.2s ease;
  }
  #topBar.visible { opacity: 1; transform: translateY(0); }

  .logo-area { display: flex; align-items: center; gap: 9px; }
  .logo-dot {
    width: 34px; height: 34px; border-radius: 11px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 900; color: #fff;
  }
  .logo-text { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: -0.3px; }
  .logo-text span { color: #60a5fa; }

  .lang-toggle {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 13px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    cursor: pointer; color: #fff;
    font-size: 13px; font-weight: 800;
    transition: background 0.2s;
  }
  .lang-toggle:active { background: rgba(255,255,255,0.15); }
  .lang-toggle .flag { font-size: 18px; }

  /* ── Hero ── */
  #heroCard {
    margin: 16px 16px 0;
    padding: 22px 20px;
    border-radius: 24px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    opacity: 0; transform: translateY(18px);
    transition: opacity 0.5s 0.4s ease, transform 0.5s 0.4s ease;
  }
  #heroCard.visible { opacity: 1; transform: translateY(0); }

  .hero-label {
    font-size: 11px; font-weight: 800; color: #60a5fa;
    letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 8px;
  }
  .hero-question { font-size: 20px; font-weight: 900; color: #fff; line-height: 1.35; margin-bottom: 5px; }
  .hero-sub      { font-size: 13px; color: rgba(255,255,255,0.45); }

  /* ── Grid ── */
  #sectionGrid {
    margin: 14px 16px 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    opacity: 0; transform: translateY(18px);
    transition: opacity 0.5s 0.6s ease, transform 0.5s 0.6s ease;
  }
  #sectionGrid.visible { opacity: 1; transform: translateY(0); }

  .sec-btn {
    padding: 16px 14px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    cursor: pointer; text-align: left;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .sec-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.13); }
  .sec-icon  { font-size: 26px; margin-bottom: 9px; display: block; }
  .sec-title { font-size: 13px; font-weight: 800; color: #fff; line-height: 1.3; }
  .sec-count { font-size: 11px; color: rgba(255,255,255,0.38); margin-top: 4px; }

  .sec-btn.blue   { border-color: rgba(96,165,250,0.28); }
  .sec-btn.green  { border-color: rgba(74,222,128,0.28); }
  .sec-btn.amber  { border-color: rgba(251,191,36,0.28); }
  .sec-btn.coral  { border-color: rgba(251,113,133,0.28); }
  .sec-btn.purple { border-color: rgba(167,139,250,0.28); }
  .sec-btn.full   { grid-column: span 2; }

  /* ── Ticker ── */
  #tickerWrap {
    margin-top: 18px; overflow: hidden;
    opacity: 0; transition: opacity 0.5s 0.9s ease;
  }
  #tickerWrap.visible { opacity: 1; }
  .ticker-label {
    font-size: 11px; font-weight: 800;
    color: rgba(255,255,255,0.3); letter-spacing: 1.4px;
    text-transform: uppercase; margin-left: 16px; margin-bottom: 9px;
  }
  .ticker-track {
    display: flex; gap: 10px;
    animation: ticker 20s linear infinite;
    width: max-content;
  }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-pill {
    padding: 9px 17px; border-radius: 30px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    white-space: nowrap; font-size: 13px; font-weight: 700; color: #fff;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .ticker-pill:active { background: rgba(255,255,255,0.15); }

  /* ── Detail screen ── */
  #detailScreen {
    position: fixed; inset: 0; z-index: 150;
    background: #0a1628;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #detailScreen.open { transform: translateY(0); }

  .detail-top {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-title { font-size: 17px; font-weight: 900; color: #fff; }

  /* ── Category tabs (edu only) ── */
  #eduTabs {
    display: none; flex-shrink: 0;
    gap: 8px; padding: 12px 16px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  #eduTabs::-webkit-scrollbar { display: none; }
  #eduTabs.show { display: flex; }

  .cat-tab {
    flex-shrink: 0; padding: 8px 22px; border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent; color: rgba(255,255,255,0.6);
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800; cursor: pointer;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
  }
  .cat-tab.active {
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    color: #fff; border-color: #7c3aed;
  }

  .card-list {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 12px;
    overflow-y: auto; flex: 1;
  }

  .info-card {
    padding: 16px;
    border-radius: 18px;
    background: rgba(22, 20, 28, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
  }
  .info-card-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .info-card-logo {
    width: 52px; height: 52px; border-radius: 14px;
    object-fit: cover; flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .info-card-title { flex: 1; }
  .info-card-name { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .info-card-tag  {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    background: rgba(96,165,250,0.15); color: #60a5fa;
    font-size: 11px; font-weight: 700; margin-bottom: 10px;
  }
  .info-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: rgba(255,255,255,0.55);
    margin-top: 5px;
  }
  .info-row span { font-size: 14px; }

  .register-btn {
    display: block; width: 100%; margin-top: 12px;
    padding: 11px; border-radius: 14px;
    background: linear-gradient(135deg, #059669, #065f46);
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    text-align: center; text-decoration: none;
    border: none; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .register-btn:active { transform: scale(0.97); opacity: 0.85; }

  /* ── Card slide-in animation ── */
  @keyframes cardSlideIn {
    from { opacity: 0; transform: translateY(22px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  .info-card {
    animation: cardSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    animation-delay: var(--card-delay, 0s);
  }

  /* ── Detail screen slide transition ── */
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(60px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  #detailScreen.open .detail-top,
  #detailScreen.open #eduTabs {
    animation: screenIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* ── Tab switch fade ── */
  @keyframes tabFade {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .card-list.switching { animation: tabFade 0.25s ease both; }
</style>
</head>

  lang = l;
  applyLang(l);
  document.getElementById('langOverlay').classList.add('hidden');
  ['topBar','heroCard','sectionGrid','tickerWrap'].forEach(id =>
    document.getElementById(id).classList.add('visible')
  );
}

function applyLang(l) {
  const t = T[l];
  document.getElementById('heroQuestion').textContent     = t.heroQuestion;
  document.getElementById('heroSub').textContent          = t.heroSub;
  document.getElementById('tickerLabel').textContent      = t.tickerLabel;
  document.getElementById('currentFlag').textContent      = t.flag;
  document.getElementById('currentLangCode').textContent  = t.langCode;
  Object.keys(t.sections).forEach(k => {
    document.getElementById('t-' + k).textContent = t.sections[k].title;
    document.getElementById('s-' + k).textContent = t.sections[k].sub;
  });
  const items = [...t.ticker, ...t.ticker];
  document.getElementById('tickerTrack').innerHTML =
    items.map(i => `<div class="ticker-pill">${i}</div>`).join('');
}

function reopenLang() {
  document.getElementById('langOverlay').classList.remove('hidden');
}

// ── Detail ──
function openDetail(key) {
  const t = T[lang];
  currentSection = key;
  document.getElementById('detailTitle').textContent = t.sections[key].title;

  const tabsEl = document.getElementById('eduTabs');

  if (key === 'edu') {
    // Show category tabs
    tabsEl.classList.add('show');
    activeEduCat = Object.keys(EDU_CATEGORIES[lang])[0];
    renderEduTabs();
    renderEduCards();
  } else {
    // Hide tabs, show normal cards
    tabsEl.classList.remove('show');
    tabsEl.innerHTML = '';
    const items = t.data[key] || [];
    document.getElementById('cardList').innerHTML = items.map((item, i) => `
      <div class="info-card" style="--card-delay:${i * 0.07}s">
        <div class="info-card-name">${item.name}</div>
        <div class="info-card-tag">${item.tag}</div>
        <div class="info-row"><span>📍</span>${item.location}</div>
        <div class="info-row"><span>📞</span><a href="tel:${item.phone.replace(/\s/g,'')}" style="color:inherit;text-decoration:none;">${item.phone}</a></div>
        <div class="info-row"><span>💰</span>${item.price}</div>
      </div>
    `).join('');
  }

  document.getElementById('detailScreen').classList.add('open');
  if (tg) tg.BackButton.show();
}

function renderEduTabs() {
  const cats = Object.keys(EDU_CATEGORIES[lang]);
  document.getElementById('eduTabs').innerHTML = cats.map(cat => `
    <button class="cat-tab ${cat === activeEduCat ? 'active' : ''}" onclick="switchEduCat('${cat}')">
      📌 ${cat}
    </button>
  `).join('');
}

function switchEduCat(cat) {
  activeEduCat = cat;
  renderEduTabs();
  renderEduCards(true);
}

function renderEduCards(switching = false) {
  const centres = EDU_CATEGORIES[lang][activeEduCat] || [];
  const btnLabel = T[lang].registerBtn;
  const cardList = document.getElementById('cardList');

  if (switching) {
    cardList.classList.add('switching');
    setTimeout(() => cardList.classList.remove('switching'), 260);
  }

  cardList.innerHTML = centres.map((c, i) => `
    <div class="info-card" style="--card-delay:${i * 0.07}s">
      <div class="info-card-header">
        <img class="info-card-logo" src="${c.logo}" alt="${c.name} logo" onerror="this.style.display='none'">
        <div class="info-card-title">
          <div class="info-card-name">${c.name}</div>
          <div class="info-card-tag">${activeEduCat}</div>
        </div>
      </div>
      <div class="info-row"><span>📍</span>${c.location}</div>
      ${c.phone ? `<div class="info-row"><span>📞</span><a href="tel:${c.phone.replace(/\s/g,'')}" style="color:inherit;text-decoration:none;">${c.phone}</a></div>` : ''}
      <a class="register-btn" href="${c.url}" target="_blank">${btnLabel}</a>
    </div>
  `).join('');
}

function closeDetail() {
  document.getElementById('detailScreen').classList.remove('open');
  document.getElementById('eduTabs').classList.remove('show');
  if (tg) tg.BackButton.hide();
}

if (tg) tg.BackButton.onClick(closeDetail);

// ── Stars ──
const sl = document.getElementById('starsLayer');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 1;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
  sl.appendChild(s);
}

// ── Clouds ──
const cl = document.getElementById('cloudLayer');
for (let i = 0; i < 6; i++) {
  const c = document.createElement('div');
  c.className = 'cloud';
  const w = 180 + Math.random()*220, h = w*(0.4+Math.random()*0.3);
  const dur = 25+Math.random()*20, op = 0.5+Math.random()*0.4;
  c.style.cssText = `width:${w}px;height:${h}px;top:${Math.random()*80}%;background:rgba(200,220,255,0.05);--cd:${dur}s;--op:${op};--delay:${-Math.random()*dur}s;`;
  cl.appendChild(c);
}

applyLang('uz');
</script>
</body>
</html>
